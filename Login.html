<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">          
    <title> VibeStream Pro || Log In </title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style> 
        * { 
            margin: 0;
            padding: 0; 
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            width: 100%;
            /* Kept your background image logic but darkened the overlay for better contrast */
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('logback.jpg'); 
            background-size: cover;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /*--- NAVIGATION SYNCED WITH HOME/ABOUT ---*/
        header {
            position: absolute;
            top: 0;
            width: 100%;
            padding: 20px 40px;
            display: flex;
            justify-content: flex-end;
        }

        header nav a {
            text-decoration: none;
            color: white;           
            margin-left: 25px;
            font-size: 13px; 
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            transition: 0.3s;
        }

        header nav a:hover, .nav-login {
            color: #32FF00 !important;
        }

        /*--- NEON LOGIN CARD ---*/
        .login-card {
            width: 420px;
            background: rgba(255, 255, 255, 0.05);   
            backdrop-filter: blur(20px);             
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(50, 255, 0, 0.2); /* Subtle lime border */
            border-radius: 25px;
            padding: 50px 40px;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.5), 0 0 20px rgba(50, 255, 0, 0.1);
            text-align: center;
            color: white;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-card h2 {
            font-size: 28px; 
            margin-bottom: 40px;
            letter-spacing: 2px;
            font-weight: 900;
            color: #32FF00; /* Neon Title */
            text-transform: uppercase;
        }

        .input-group {
            position: relative; 
            margin-bottom: 35px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.5); 
            transition: 0.3s;
        }

        .input-group:focus-within {
            border-bottom-color: #32FF00; /* Glows lime when typing */
        }

        .input-group input {
            width: 100%;
            padding: 10px 0;
            background: transparent;
            border: none;
            outline: none;
            color: white;
            font-size: 16px;
        }

        .input-group label {
            position: absolute;
            top: 10px;
            left: 0;
            pointer-events: none;
            transition: 0.3s ease;
            color: rgba(255, 255, 255, 0.6);
        }

        .input-group input:focus ~ label,
        .input-group input:valid ~ label {
            top: -20px;
            font-size: 12px;
            color: #32FF00;
        }

        .icon {
            position: absolute;
            right: 0;
            top: 10px;
            opacity: 0.7;
            color: #32FF00;
        }

        .options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            margin-bottom: 30px;
            color: rgba(255, 255, 255, 0.8);
        }

        .options input {
            accent-color: #32FF00;
            margin-right: 5px;
        }

        .options a {
            color: white;
            text-decoration: none;
            transition: 0.3s;
        }

        .options a:hover {
            color: #32FF00;
        }

        /*--- LIME BUTTON ---*/
        .login-btn {
            width: 100%;
            padding: 14px;
            background: #32FF00; /* Neon Lime */
            border: none;
            border-radius: 30px;
            color: black; /* High contrast */
            font-weight: 800;
            font-size: 16px;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 20px rgba(50, 255, 0, 0.2);
        }

        .login-btn:hover { 
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(50, 255, 0, 0.5);
            background: #2ce000;
        }

        .footer-text { margin-top: 25px; font-size: 13px; color: rgba(255, 255, 255, 0.7); }
        .footer-text a { color: #32FF00; text-decoration: none; font-weight: 600; margin-left: 5px; }
        .footer-text a:hover { text-decoration: underline; }

    </style>
</head>
<body>

<header>
  <nav> 
     <a href="index.html"> HOME </a>
     <a href="About.html"> ABOUT </a>
     <a href="Premium.html"> PREMIUM </a>
     <a href="Login.html" class="nav-login"> LOG-IN </a>
  </nav>
</header>

<div class="login-card">
    <h2> VibeStream Pro </h2> 

    <form> 
        <div class="input-group">
            <input type="text" required>
            <label> Email </label>
            <span class="icon">✉</span>
        </div>

        <div class="input-group">
            <input type="password" required>
            <label> Password </label>
            <span class="icon">👁</span>
        </div>

        <div class="options">
            <label><input type="checkbox"> Remember Me</label>
            <a href="#">Forgot Password?</a>
        </div>

        <button type="submit" class="login-btn"> Login </button>
        <div class="footer-text"> Don't have an Account? <a href="#"> Register </a></div>
    </form>
</div>

</body>
</html>
