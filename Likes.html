<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> VibeStream Pro || Liked Songs </title>
    <style> 
        /*--- UNIVERSAL SYNCED STYLES ---*/
        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: black;
            color: white;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /*--- NAVIGATION ---*/
        .header-nav {
            background-color: black;
            padding: 10px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            height: 75px; 
            border-bottom: 1px solid #1a1a1a;
        }

        .left-nav { display: flex; gap: 20px; align-items: center; }
        .nav-item { display: flex; align-items: center; gap: 10px; text-decoration: none; color: white; font-weight: bold; font-size: 14px; transition: 0.2s; cursor: pointer; }
        .nav-item:hover { color: #5EED18; }
        .custom-icon { width: 32px; height: 32px; filter: drop-shadow(0 0 8px #1DB954); }
        .site-logo { font-size: 18px; font-weight: 900; color: #5EED18; margin-left: 15px; text-transform: uppercase; letter-spacing: 1px; }

        .header-right { display: flex; align-items: center; gap: 16px; }
        .search-container input { background-color: #121212; border: 1px solid #333; border-radius: 20px; padding: 10px 20px; color: white; width: 250px; font-size: 14px; outline: none; transition: border 0.3s; }
        .search-container input:focus { border-color: #5EED18; }
        
        .account-icon { 
            width: 38px; 
            height: 38px; 
            background-color: #282828; 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            overflow: hidden; 
            border: 2px solid #5EED18; 
            cursor: pointer; 
            transition: 0.3s;
        }
        .account-icon img { width: 100%; height: 100%; object-fit: cover; }

        /*--- SIGN-IN CARD ---*/
        .login-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none; 
            justify-content: center;
            align-items: center;
            z-index: 2000;
            backdrop-filter: blur(10px);
        }

        .login-card {
            width: 420px;
            background: #000;   
            border: 1px solid #5EED18; 
            border-radius: 25px; 
            padding: 40px;
            position: relative;
            box-shadow: 0px 0px 20px rgba(94, 237, 24, 0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .close-btn { position: absolute; top: 20px; right: 25px; color: white; font-size: 28px; cursor: pointer; line-height: 1; }
        .login-card h2 { color: #5EED18; margin-bottom: 30px; font-size: 22px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; text-align: center; width: 100%; }
        
        .input-group { position: relative; margin-bottom: 25px; border-bottom: 1px solid #333; text-align: left; width: 100%; }
        .input-group input { width: 100%; padding: 10px 0; background: none; border: none; outline: none; color: white; font-size: 14px; }
        .input-group label { position: absolute; top: 10px; left: 0; transition: 0.3s; color: rgba(255,255,255,0.5); pointer-events: none; }
        .input-group input:focus ~ label, .input-group input:valid ~ label { top: -15px; font-size: 12px; color: #5EED18; }

        .login-options { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; font-size: 12px; width: 100%; }
        .remember-me { display: flex; align-items: center; gap: 5px; color: #b3b3b3; }
        .forgot-link { color: #5EED18; text-decoration: none; }

        .login-btn { width: 100%; padding: 12px; background: #5EED18; border: none; border-radius: 25px; font-weight: bold; color: black; cursor: pointer; margin-bottom: 15px; text-transform: uppercase; font-size: 16px; }

        .divider { margin: 15px 0; border-bottom: 1px solid #333; position: relative; width: 100%; }
        .divider span { background: #000; padding: 0 10px; color: #666; font-size: 11px; position: absolute; top: -8px; left: 50%; transform: translateX(-50%); }

        .social-btn { width: 100%; padding: 10px; border-radius: 25px; border: 1px solid #333; background: transparent; color: white; font-size: 13px; cursor: pointer; margin-bottom: 10px; }
        .login-footer { margin-top: 15px; font-size: 13px; color: #b3b3b3; text-align: center; }
        .login-footer a { color: #5EED18; text-decoration: none; font-weight: bold; }

        /*--- MAIN CONTENT ---*/
        .main-content {
            flex: 1;
            padding: 40px;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
        }

        h2.page-title { 
            margin: 0 0 30px 0;
            font-size: 48px; 
            font-weight: 900;
            color: white; 
            text-transform: uppercase; 
            letter-spacing: -1px; 
            transition: 0.4s ease;
            display: inline-block;
        }

        /*--- COLUMN LIST ---*/
        .column-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            margin-bottom: 50px;
        }

        .card {
            display: flex;
            align-items: center;
            background-color: #080808;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #1a1a1a;
            transition: 0.3s;
            height: 90px;
            padding-right: 20px;
        }

        .card:hover {
            background-color: #111;
            border-color: #5EED18;
        }

        .card-img img { width: 90px; height: 90px; object-fit: cover; }

        .card-text {
            padding-left: 30px; 
            font-weight: 800;
            font-size: 18px;
            color: #ffffff;
            flex: 1;
        }

        .audio-wrapper {
            display: flex;
            align-items: center;
        }

        audio {
            height: 35px;
            width: 320px; 
            filter: invert(100%) hue-rotate(85deg) brightness(1.2) saturate(2);
            opacity: 0.7;
        }

        .footer { border-top: 1px solid #1a1a1a; padding: 60px 40px; text-align: center; color: rgba(255,255,255,0.2); font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }

    </style>
</head>
<body>

    <header class="header-nav">
        <div class="left-nav">
            <a href="Home.html" class="nav-item"><img src="homeicon.png" class="custom-icon"> HOME</a>
            <a href="Premium.html" class="nav-item"><img src="premium.png" class="custom-icon"> PREMIUM</a>
            <a href="About.html" class="nav-item"><img src="abouticon.png" class="custom-icon"> ABOUT US</a>
            <span class="site-logo">VIBESTREAM PRO</span>
        </div>
        <div class="header-right">
            <div class="search-container">
                <input type="text" id="searchInput" onkeyup="filterSongs()" placeholder="Search for songs...">
            </div>
            <div class="account-icon" onclick="toggleLogin()">
                <img src="pfp.png" alt="Profile">
            </div>
        </div>
    </header>

    <div class="login-overlay" id="loginOverlay">
        <div class="login-card">
            <span class="close-btn" onclick="toggleLogin()">×</span>
            <h2> ACCESS VIBESTREAM PRO </h2> 
            <form> 
                <div class="input-group"><input type="text" required><label>Email or Username</label></div>
                <div class="input-group"><input type="password" required><label>Password</label></div>
                <div class="login-options">
                    <label class="remember-me"><input type="checkbox"> Remember me</label>
                    <a href="#" class="forgot-link">Forgot password?</a>
                </div>
                <button type="submit" class="login-btn"> LOG IN </button>
                <div class="divider"><span>OR</span></div>
                <button type="button" class="social-btn">Continue with Google</button>
                <button type="button" class="social-btn">Continue with Facebook</button>
                <div class="login-footer">
                    Don't have an account? <a href="#">Sign up for VibeStream</a>
                </div>
            </form>
        </div>
    </div>

    <main class="main-content">
        
        <h2 class="page-title"> LIKED SONGS </h2>

        <div class="column-list" id="songList">
            <div class="card">
                <div class="card-img"><img src="SKL.png"></div>
                <div class="card-text"> KAMEHAMEHA - SunKissed Lola </div>
                <div class="audio-wrapper"><audio controls src="KamehaSKL.mp3"></audio></div>
            </div>

            <div class="card">
                <div class="card-img"><img src="Suyen.png"></div>
                <div class="card-text"> Tampo - Suyen </div>
                <div class="audio-wrapper"><audio controls src="TampoSuyen.mp3"></audio></div>
            </div>

            <div class="card">
                <div class="card-img"><img src="Halina.png"></div>
                <div class="card-text"> Tukso - Halina </div>
                <div class="audio-wrapper"><audio controls src="TuksoHalina.mp3"></audio></div>
            </div>

            <div class="card">
                <div class="card-img"><img src="BTB.png"></div>
                <div class="card-text"> Quiapo - Bita and the Botflies </div>
                <div class="audio-wrapper"><audio controls src="QuiapoBTB.mp3"></audio></div>
            </div>
        </div>

    </main>

    <footer class="footer"> ALL RIGHTS RESERVED - VIBE STREAM PRO 2026 </footer>

    <script>
        function toggleLogin() {
            const overlay = document.getElementById('loginOverlay');
            overlay.style.display = (overlay.style.display === 'flex') ? 'none' : 'flex';
        }

        // Search Filter Logic
        function filterSongs() {
            const input = document.getElementById('searchInput');
            const filter = input.value.toLowerCase();
            const songList = document.getElementById('songList');
            const cards = songList.getElementsByClassName('card');

            for (let i = 0; i < cards.length; i++) {
                const title = cards[i].getElementsByClassName('card-text')[0];
                if (title.innerText.toLowerCase().includes(filter)) {
                    cards[i].style.display = "flex"; // Show card
                } else {
                    cards[i].style.display = "none"; // Hide card
                }
            }
        }
    </script>

</body>
</html>
