<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> VibeStream Pro || Homepage </title>
    <style> 
        /*--- UNIVERSAL SYNCED STYLES ---*/
        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: black;
            color: white;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /*--- HEADER (TOP NAV) ---*/
        .header-nav {
            background-color: black;
            padding: 10px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            height: 75px; 
            border-bottom: 1px solid #1a1a1a;
        }

        .site-logo { font-size: 18px; font-weight: 900; color: #5EED18; text-transform: uppercase; letter-spacing: 1px; }

        .header-right { display: flex; align-items: center; gap: 16px; }
        .search-container input { background-color: #121212; border: 1px solid #333; border-radius: 20px; padding: 10px 20px; color: white; width: 250px; font-size: 14px; outline: none; transition: 0.3s; }
        .search-container input:focus { border-color: #5EED18; }
        
        .account-icon { width: 38px; height: 38px; background-color: #282828; border-radius: 50%; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 2px solid #5EED18; cursor: pointer; }
        .account-icon img { width: 100%; height: 100%; object-fit: cover; }

        /*--- FLOATING PLAYER ---*/
        .mini-player {
            position: fixed;
            bottom: 85px; 
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 30px);
            max-width: 450px;
            background-color: #282828;
            border-radius: 12px;
            display: flex;
            align-items: center;
            padding: 10px 15px;
            z-index: 2900;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .mini-player img.album-art { width: 45px; height: 45px; border-radius: 6px; margin-right: 12px; object-fit: cover; }
        
        .player-info { flex: 1; min-width: 0; }
        .player-info .song-title { font-size: 14px; font-weight: 700; display: block; color: white; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .player-info .artist-name { font-size: 12px; color: #b3b3b3; }

        .player-controls { display: flex; gap: 15px; align-items: center; }
        
        /* Interactive Buttons */
        .control-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
        }
        .control-btn:hover { transform: scale(1.1); }
        .control-btn img { width: 22px; height: 22px; filter: invert(1); }
        .control-btn.play-trigger img { width: 28px; height: 28px; }

        /*--- MOBILE BOTTOM NAV ---*/
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 75px;
            background-color: rgba(0, 0, 0, 0.98);
            border-top: 1px solid #1a1a1a;
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 3000;
            padding-bottom: 5px;
        }

        .nav-item { 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            gap: 4px; 
            text-decoration: none; 
            color: #b3b3b3; 
            font-size: 10px; 
            font-weight: 600;
            transition: 0.2s;
            flex: 1;
        }
        .nav-item:hover, .nav-item.active { color: #5EED18; }
        .nav-icon { width: 24px; height: 24px; margin-bottom: 2px; }

        /*--- LOGIN OVERLAY ---*/
        .login-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none; 
            justify-content: center;
            align-items: center;
            z-index: 4000;
            backdrop-filter: blur(10px);
        }

        .login-card {
            width: 400px;
            background: #000;   
            border: 1px solid #5EED18; 
            border-radius: 20px; 
            padding: 40px;
            position: relative;
            text-align: center;
        }

        .close-btn { position: absolute; top: 15px; right: 20px; color: white; font-size: 24px; cursor: pointer; }
        .login-card h2 { color: #5EED18; margin-bottom: 25px; font-size: 20px; letter-spacing: 1px; }
        
        .input-group { position: relative; margin-bottom: 25px; border-bottom: 1px solid #333; }
        .input-group input { width: 100%; padding: 10px 0; background: none; border: none; outline: none; color: white; }
        .input-group label { position: absolute; top: 10px; left: 0; transition: 0.3s; color: rgba(255,255,255,0.5); pointer-events: none; }
        .input-group input:focus ~ label, .input-group input:valid ~ label { top: -15px; font-size: 12px; color: #5EED18; }

        .login-btn { width: 100%; padding: 12px; background: #5EED18; border: none; border-radius: 25px; font-weight: bold; cursor: pointer; margin-top: 10px; }

        /*--- MAIN CONTENT ---*/
        .main-content { flex: 1; width: 100%; padding: 20px 24px 180px 24px; }
        h2 { margin-top: 40px; margin-bottom: 15px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; font-size: 20px; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
        .card { display: flex; align-items: center; background-color: #181818; border-radius: 4px; overflow: hidden; height: 60px; transition: 0.3s; cursor: pointer; }
        .card:hover { background-color: #282828; }
        .card img { width: 60px; height: 60px; object-fit: cover; }
        .card-text { padding: 0 12px; font-weight: bold; font-size: 13px; }

        .square-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; margin-top: 20px; }
        .square-card { background-color: #121212; padding: 15px; border-radius: 8px; transition: 0.3s; }
        .square-card:hover { background-color: #282828; }
        .square-img { width: 100%; aspect-ratio: 1/1; border-radius: 4px; object-fit: cover; margin-bottom: 10px; }

        .footer { padding: 40px; text-align: center; color: #444; font-size: 12px; font-weight: bold; border-top: 1px solid #1a1a1a; }
    </style>
</head>
<body>

    <header class="header-nav">
        <span class="site-logo">VIBESTREAM PRO</span>
        <div class="header-right">
            <div class="search-container">
                <input type="text" id="searchInput" onkeyup="filterCards()" placeholder="Search...">
            </div>
            <div class="account-icon" onclick="toggleLogin()"><img src="pfp.png" alt="User"></div>
        </div>
    </header>

    <div class="mini-player">
        <img src="girlinred.jpg" class="album-art" alt="Girl in Red">
        <div class="player-info">
            <span class="song-title">we fell in love in october</span>
            <span class="artist-name">girl in red</span>
        </div>
        <div class="player-controls">
            <button class="control-btn" title="Like">
                <img src="heart-outline.png" alt="Heart">
            </button>
            <button class="control-btn play-trigger" title="Play">
                <img src="play-solid.png" alt="Play">
            </button>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item active">
            <img src="home-icon.png" class="nav-icon">
            <span>HOME</span>
        </a>
        <a href="#" class="nav-item">
            <img src="search-icon.png" class="nav-icon">
            <span>SEARCH</span>
        </a>
        <a href="#" class="nav-item">
            <img src="library-icon.png" class="nav-icon">
            <span>LIBRARY</span>
        </a>
        <a href="Premium.html" class="nav-item">
            <img src="premium-icon.png" class="nav-icon">
            <span>PREMIUM</span>
        </a>
        <a href="About.html" class="nav-item">
            <img src="about-icon.png" class="nav-icon">
            <span>ABOUT</span>
        </a>
    </nav>

    <div class="login-overlay" id="loginOverlay">
        <div class="login-card">
            <span class="close-btn" onclick="toggleLogin()">×</span>
            <h2> LOGIN </h2> 
            <form> 
                <div class="input-group"><input type="text" required><label>Username</label></div>
                <div class="input-group"><input type="password" required><label>Password</label></div>
                <button type="submit" class="login-btn">ENTER</button>
            </form>
        </div>
    </div>

    <main class="main-content">
        <div class="grid" id="mainGrid">
            <div class="card"><img src="like.jpg"><div class="card-text">Liked Songs</div></div>
            <div class="card"><img src="wale.jpg"><div class="card-text">Pinoy Music</div></div>
            <div class="card"><img src="kpop.jpg"><div class="card-text">K-pop</div></div>
            <div class="card"><img src="rock.jpg"><div class="card-text">Hardrock</div></div>
        </div>

        <h2>Recommended For You</h2>
        <div class="square-container" id="recommendGrid">
            <div class="square-card"><img src="daily1.jpg" class="square-img"><strong>Daily Mix 1</strong></div>
            <div class="square-card"><img src="daily2.jpg" class="square-img"><strong>Daily Mix 2</strong></div>
            <div class="square-card"><img src="daily3.jpg" class="square-img"><strong>Daily Mix 3</strong></div>
            <div class="square-card"><img src="daily4.jpg" class="square-img"><strong>Daily Mix 4</strong></div>
        </div>
    </main>

    <footer class="footer"> VIBESTREAM PRO © 2026 </footer>

    <script>
        function toggleLogin() {
            const overlay = document.getElementById('loginOverlay');
            overlay.style.display = (overlay.style.display === 'flex') ? 'none' : 'flex';
        }

        function filterCards() {
            const filter = document.getElementById('searchInput').value.toLowerCase();
            const items = document.querySelectorAll('.card, .square-card');
            items.forEach(item => {
                item.style.display = item.innerText.toLowerCase().includes(filter) ? "" : "none";
            });
        }
    </script>
</body>
</html>
